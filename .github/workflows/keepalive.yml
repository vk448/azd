name: Keep Alive

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          for i in 1 2 3; do
            curl -s -o /dev/null -w "Attempt $i: HTTP %{http_code}\n" https://animezilla.wasmer.app/api/health || true
            sleep 2
          done
