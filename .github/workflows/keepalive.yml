name: Keep Alive

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Warm up API
        run: |
          curl -s -o /dev/null -w "Health: HTTP %{http_code}\n" https://animezilla.wasmer.app/api/health || true
          sleep 1
          curl -s -o /dev/null -w "HLS.js: HTTP %{http_code}\n" https://animezilla.wasmer.app/api/hls.js || true
          sleep 1
          curl -s -o /dev/null -w "Embed: HTTP %{http_code}\n" https://animezilla.wasmer.app/api/anime-embed/199221/episode/6 || true
