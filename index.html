<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeZilla - Download Anime</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;min-height:100vh;background:#0a0808;color:#fff;display:flex;align-items:center;justify-content:center;overflow:hidden}
.animated-bg{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#0a0808 0%,#1a0a08 30%,#0d0a06 60%,#0a0808 100%);overflow:hidden}
.animated-bg::before{content:'';position:absolute;width:700px;height:700px;background:radial-gradient(circle,rgba(255,60,47,0.07) 0%,transparent 70%);top:-250px;right:-250px;animation:float 8s ease-in-out infinite}
.animated-bg::after{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(255,170,0,0.05) 0%,transparent 70%);bottom:-200px;left:-200px;animation:float 10s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,-30px)}}
.c{position:relative;z-index:10;text-align:center;padding:40px 20px}
.li{width:80px;height:80px;background:linear-gradient(135deg,#ff3c2f,#ff6b35,#ffaa00);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 24px;box-shadow:0 10px 50px rgba(255,60,47,0.4),0 0 80px rgba(255,100,0,0.15);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 10px 50px rgba(255,60,47,0.4),0 0 80px rgba(255,100,0,0.15)}50%{box-shadow:0 10px 60px rgba(255,170,0,0.5),0 0 100px rgba(255,60,47,0.2)}}
.lt{font-size:40px;font-weight:900;background:linear-gradient(135deg,#ff3c2f 0%,#ff6b35 40%,#ffaa00 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 4px 15px rgba(255,100,0,0.3));margin-bottom:12px}
.st{color:rgba(255,255,255,0.35);font-size:16px;margin-bottom:40px;letter-spacing:0.5px}
.ex{background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.05);border-radius:16px;padding:24px;max-width:520px;margin:0 auto;text-align:left;backdrop-filter:blur(20px)}
.ex h3{color:#ff6b35;font-size:12px;margin-bottom:14px;letter-spacing:2px;text-transform:uppercase;font-weight:700}
.ex code{display:block;color:rgba(255,255,255,0.5);font-size:13px;margin:8px 0;font-family:monospace;word-break:break-all;padding:10px 14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);border-radius:10px;transition:all .3s}
.ex code:hover{background:rgba(255,60,47,0.06);border-color:rgba(255,60,47,0.12);color:rgba(255,255,255,0.7)}
</style>
</head>
<body>
<div class="animated-bg"></div>
<div class="c">
<div class="li"><i class="fas fa-bolt"></i></div>
<h1 class="lt">AnimeZilla</h1>
<p class="st">Download your favorite anime in Sub &amp; Dub</p>
<div class="ex">
<h3>API Endpoints</h3>
<code>/api/mal/{id}/page?episode=1</code>
<code>/api/mal/{id}/season</code>
<code>/api/page?title=One+Piece&amp;episode=1</code>
</div>
</div>
</body>
</html>
