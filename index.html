<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeZilla - Download Anime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;min-height:100vh;background:#08080c;color:#fff;display:flex;align-items:center;justify-content:center}
        .c{text-align:center;padding:40px 20px}
        .li{width:80px;height:80px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 24px;box-shadow:0 10px 40px rgba(124,58,237,0.4)}
        .lt{font-size:36px;font-weight:900;background:linear-gradient(135deg,#c084fc,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
        .st{color:rgba(255,255,255,0.4);font-size:16px;margin-bottom:30px}
        .ex{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;max-width:500px;margin:0 auto;text-align:left}
        .ex h3{color:#a855f7;font-size:13px;margin-bottom:10px;letter-spacing:1px}
        .ex code{display:block;color:rgba(255,255,255,0.6);font-size:13px;margin:6px 0;font-family:monospace;word-break:break-all}
    </style>
</head>
<body>
    <div class="c">
        <div class="li"><i class="fas fa-bolt"></i></div>
        <h1 class="lt">AnimeZilla</h1>
        <p class="st">Download your favorite anime in Sub &amp; Dub</p>
        <div class="ex">
            <h3>API ENDPOINTS</h3>
            <code>/api/mal/{mal_id}/page?episode=1</code>
            <code>/api/page?title=One+Piece&amp;episode=1&amp;sub=URL&amp;dub=URL</code>
            <code>/api/mal?mal_id=21&amp;episode=1</code>
        </div>
    </div>
</body>
</html>
