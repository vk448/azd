<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeZilla - Download Anime</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;min-height:100vh;background:#08080c;color:#fff;display:flex;align-items:center;justify-content:center}
        .container{text-align:center;padding:40px 20px}
        .logo-icon{width:80px;height:80px;background:linear-gradient(135deg,#7c3aed,#a855f7);border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 24px;box-shadow:0 10px 40px rgba(124,58,237,0.4)}
        .logo-text{font-size:36px;font-weight:900;background:linear-gradient(135deg,#c084fc,#a855f7,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:12px}
        .subtitle{color:rgba(255,255,255,0.4);font-size:16px;margin-bottom:40px}
        .search-box{max-width:400px;margin:0 auto;position:relative}
        .search-box input{width:100%;padding:16px 20px 16px 50px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:#fff;font-size:16px;font-family:inherit;outline:none;transition:border-color .3s}
        .search-box input:focus{border-color:#7c3aed}
        .search-box input::placeholder{color:rgba(255,255,255,0.3)}
        .search-box i{position:absolute;left:18px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,0.3)}
        .hint{margin-top:20px;font-size:13px;color:rgba(255,255,255,0.25)}
        .hint code{background:rgba(124,58,237,0.2);padding:2px 8px;border-radius:6px;font-size:12px;color:#c084fc}
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-icon"><i class="fas fa-bolt"></i></div>
        <h1 class="logo-text">AnimeZilla</h1>
        <p class="subtitle">Download your favorite anime in Sub & Dub</p>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search anime..." id="search">
        </div>
        <p class="hint">API: <code>/api/mal/{mal_id}/page?episode=1</code></p>
    </div>
    <script>
        document.getElementById('search').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const q = this.value.trim();
                if (q) window.open('https://9anime.org.lv/?s=' + encodeURIComponent(q), '_blank');
            }
        });
    </script>
</body>
</html>
